 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkforceIQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
 
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
 
<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">Workforce<span>IQ</span></div>
            <div class="brand-tagline">HR Intelligence Platform</div>
        </div>
 
        <nav class="sidebar-nav">
            <div class="nav-section-label">Main</div>
 
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                Dashboard
            </a>
 
            <a href="/employees" class="nav-link {% if request.path == '/employees' %}active{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Employees
            </a>
 
            <div class="nav-section-label" style="margin-top:8px;">Tracking</div>
 
            <a href="/attendance" class="nav-link {% if request.path == '/attendance' %}active{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Attendance
            </a>
 
            <a href="/leaves" class="nav-link {% if request.path == '/leaves' %}active{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="15" y2="17"/>
                </svg>
                Leave Manager
            </a>
 
            <div class="nav-section-label" style="margin-top:8px;">Finance</div>
 
            <a href="/payroll" class="nav-link {% if request.path == '/payroll' %}active{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Payroll
            </a>
        </nav>
 
        <div class="sidebar-footer">
            WorkforceIQ v2.0 &mdash; SQL Core
        </div>
    </aside>
 
    <!-- MAIN -->
    <div class="main">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:14px;">
                <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div>
                    <div class="topbar-title">{% block topbar_title %}WorkforceIQ{% endblock %}</div>
                    <div class="topbar-sub">{% block topbar_sub %}HR Intelligence Platform{% endblock %}</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="topbar-date" id="topbar-date"></div>
            </div>
        </header>
 
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
 
<script>
    // Live date in topbar
    (function() {
        const el = document.getElementById('topbar-date');
        const d = new Date();
        const opts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
        el.textContent = d.toLocaleDateString('en-IN', opts);
    })();
 
    // Sidebar toggle for mobile
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    }
</script>
 
</body>
</html>
